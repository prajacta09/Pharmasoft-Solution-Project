name: Test Secrets Validation

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret name to test'
        required: true
        default: 'BASE_URL'

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Print available secrets (safe ones only)
      run: |
        echo "=== Available Secrets ==="
        echo "BASE_URL: ${{ secrets.BASE_URL }}"
        echo "NODE_VERSION: ${{ secrets.NODE_VERSION }}"
        echo "SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}"
        echo "=========================="
    
    - name: Test secret usage
      run: |
        echo "Testing secret: ${{ github.event.inputs.secret_name }}"
        if [ -n "${{ secrets[github.event.inputs.secret_name] }}" ]; then
          echo "Secret is available!"
          echo "Secret value: ${{ secrets[github.event.inputs.secret_name] }}"
        else
          echo "Secret is not available or empty"
        fi
    
    - name: Create test environment file
      run: |
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://pharmasoftsol.com/' }}" > .env
        echo "NODE_VERSION=${{ secrets.NODE_VERSION || '18' }}" >> .env
        echo "Created .env file with secrets"
    
    - name: Show .env content
      run: cat .env
