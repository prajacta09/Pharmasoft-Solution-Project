name: CI Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install chromium
    
    - name: Run tests
      run: npm test
      env:
        BASE_URL: ${{ secrets.BASE_URL || 'https://pharmasoftsol.com/' }}
        HEADLESS: true
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: results
        path: |
          screenshots/
          allure-results/
        retention-days: 3
